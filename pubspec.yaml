name: dartssh2
version: 2.13.0
description: SSH and SFTP client written in pure Dart, aiming to be feature-rich as well as easy to use.
homepage: https://github.com/TerminalStudio/dartssh2

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  asn1lib: ^1.5.8
  convert: ^3.1.2
  meta: ^1.12.0
  pointycastle: ^3.9.1
  pinenacl: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  dart_code_metrics_presets: ^2.20.0
  lints: ">=2.0.0 <6.0.0"

false_secrets:
  - test
